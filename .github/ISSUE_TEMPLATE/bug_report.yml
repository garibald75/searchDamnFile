name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Set root path to ...
        3. Search for ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Include status-bar errors, path type, screenshots, or sample file names if useful.
    validations:
      required: false
